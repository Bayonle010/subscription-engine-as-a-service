server:
  port: ${PORT:8083}

spring:
  application:
    name: subscription-engine

  docker:
    compose:
      enabled: false

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT:5432}/${DATABASE_NAME}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


app:
  cors:
    allowed-origins: "*"
    allow-credentials: false


payment:
  nomba:
    base-url: ${NOMBA_BASE_URL:https://sandbox.api.nomba.com}
    account-id: ${NOMBA_PARENT_ACCOUNT_ID}
    client-id: ${NOMBA_CLIENT_ID}
    client-secret: ${NOMBA_CLIENT_SECRET}
    sub-account:
      enabled: false

http:
  connect-timeout-ms: 5000
  response-timeout-ms: 15000