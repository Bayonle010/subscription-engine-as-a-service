server:
  port: ${PORT:8083}

spring:
  application:
    name: subscription-engine

  docker:
    compose:
      enabled: false

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT:5432}/${DATABASE_NAME}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


app:
  cors:
    allowed-origins: "*"
    allow-credentials: false


payment:
  nomba:
    base-url: ${NOMBA_BASE_URL:https://sandbox.api.nomba.com}
    account-id: ${NOMBA_PARENT_ACCOUNT_ID}
    subaccount-id: ${NOMBA_SUBACCOUNT_ID}
    client-id: ${NOMBA_CLIENT_ID}
    client-secret: ${NOMBA_CLIENT_SECRET}
    webhook-secret: ${NOMBA_WEBHOOK_SECRET:}
    sub-account:
      enabled: false

http:
  connect-timeout-ms: 5000
  response-timeout-ms: 15000


billing:
  platform-fee:
    percentage: ${PLATFORM_FEE_PERCENTAGE:0}
    fixed-amount: ${PLATFORM_FEE_FIXED_AMOUNT:0}

mail:
  transport: api

zeptomail:
  base-url: https://api.zeptomail.com/v1.1
  token: ${ZEPTOMAIL_TOKEN}
  from:
    address: noreply@subgrid.com
    name: Subgrid
  reply-to: ${ZEPTOMAIL_REPLY_TO:}
  include-text: true

event-outbox:
  processor:
    fixed-delay-ms: 30000


renewal:
  processor:
    fixed-delay-ms: 60000
    batch-size: 25

dunning:
  grace-period-days: 7
  max-retry-attempts: 3
  retry-delays-hours:
    - 24
    - 72
    - 168
  cancel-after-final-failure: true
  processor:
    fixed-delay-ms: 60000
    batch-size: 25


customer-portal:
  public-base-url: ${CUSTOMER_PORTAL_PUBLIC_BASE_URL:http://localhost:8083}
  rescue-link-expiry-hours: 168
  management-link-expiry-hours: 720

reconciliation:
  fixed-delay-ms: 120000
  batch-size: 25
  pending-min-age-minutes: 5
  pending-expire-after-hours: 24
  retry-failed-webhooks: true
  failed-webhook-retry-age-minutes: 2

subscription:
  cancellation-processor:
    fixed-delay-ms: 60000
    batch-size: 25

renewal-checkout:
  checkout-expiry-hours: 24